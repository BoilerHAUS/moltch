<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>moltch cockpit</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>moltch cockpit</h1>
    <p id="healthline">loading status…</p>
  </header>
  <main class="grid">
    <section>
      <h2>threads</h2>
      <div id="threads-state" class="state loading">loading thread stream…</div>
    </section>
    <section>
      <h2>tasks</h2>
      <div id="tasks-state" class="state loading">loading task board…</div>
    </section>
    <section>
      <h2>treasury</h2>
      <div id="treasury-state" class="state loading">loading proposal queue…</div>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
