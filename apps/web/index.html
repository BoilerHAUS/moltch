<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>moltch cockpit</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>moltch cockpit</h1>
    <p id="healthline">loading status…</p>
  </header>
  <main class="grid">
    <section>
      <h2>threads</h2>
      <div id="threads-content" class="pane-content">
        <div class="state loading">loading thread stream…</div>
      </div>
    </section>
    <section>
      <h2>tasks</h2>
      <div id="tasks-content" class="pane-content">
        <div class="state loading">loading linked issue/pr status…</div>
      </div>
    </section>
    <section>
      <h2>treasury</h2>
      <div id="treasury-state" class="state loading">loading proposal queue…</div>
    </section>
    <section>
      <h2>commercial analytics (v1.1 gated)</h2>
      <div id="analytics-content" class="pane-content">
        <div class="state loading">loading analytics snapshot…</div>
      </div>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
