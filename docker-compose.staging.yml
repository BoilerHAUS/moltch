name: moltch-staging

services:
  api:
    build:
      context: ./services/api
    image: moltch/api:staging
    environment:
      NODE_ENV: ${API_NODE_ENV:-production}
      PORT: ${API_PORT:-8080}
      APP_NAME: ${API_APP_NAME:-moltch-api}
      READY_TOKEN: ${API_READY_TOKEN:-}
    ports:
      - "${API_HOST_PORT:-8080}:${API_PORT:-8080}"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:$${PORT}/health"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  web:
    build:
      context: ./apps/web
    image: moltch/web:staging
    environment:
      PORT: ${WEB_PORT:-3000}
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_HOST_PORT:-3000}:${WEB_PORT:-3000}"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:$${PORT}/"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped
